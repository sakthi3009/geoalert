<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GeoAlert — Register</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#080c10;--surf:#0e1419;--surf2:#141c24;--border:#1e2d3d;--accent:#f5a623;--red:#ff4455;--blue:#3b9eff;--text:#d4e4f7;--muted:#5a7a99;--head:'Bebas Neue',sans-serif;--body:'DM Sans',sans-serif;--mono:'DM Mono',monospace;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--body);min-height:100vh;display:flex;align-items:center;justify-content:center;}
.box{background:var(--surf);border:1px solid var(--border);border-radius:16px;padding:40px;width:100%;max-width:420px;}
.logo{font-family:var(--head);font-size:32px;color:var(--accent);text-align:center;margin-bottom:4px;}
.sub{font-family:var(--mono);font-size:10px;color:var(--muted);text-align:center;letter-spacing:2px;margin-bottom:28px;}
label{font-size:12px;color:var(--muted);display:block;margin-bottom:6px;font-family:var(--mono);}
input{width:100%;background:var(--surf2);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:8px;font-family:var(--mono);font-size:13px;outline:none;margin-bottom:16px;}
input:focus{border-color:var(--accent);}
.hint{font-size:11px;color:var(--muted);margin-top:-12px;margin-bottom:14px;}
.btn{width:100%;background:linear-gradient(135deg,var(--accent),#ff7a2f);border:none;color:#000;padding:12px;border-radius:8px;font-family:var(--mono);font-size:13px;font-weight:500;cursor:pointer;margin-top:4px;}
.link{text-align:center;margin-top:16px;font-size:13px;color:var(--muted);}
.link a{color:var(--accent);text-decoration:none;}
.flash{padding:10px 14px;border-radius:8px;margin-bottom:16px;font-size:13px;}
.flash.error{background:rgba(255,68,85,0.1);border:1px solid rgba(255,68,85,0.3);color:var(--red);}
.flash.success{background:rgba(6,214,160,0.1);border:1px solid rgba(6,214,160,0.3);color:#06d6a0;}
</style>
</head>
<body>
<div class="box">
  <div class="logo">🌐 GeoAlert</div>
  <div class="sub">Create your account</div>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="flash {{ cat }}">{{ msg }}</div>
    {% endfor %}
  {% endwith %}
  <form method="POST">
    <label>Username</label>
    <input type="text" name="username" placeholder="Choose a username" required/>
    <label>Email</label>
    <input type="email" name="email" placeholder="your@email.com" required/>
    <label>Password</label>
    <input type="password" name="password" placeholder="Min 6 characters" required/>
    <label>Alert Email (optional)</label>
    <input type="email" name="alert_email" placeholder="Email for critical alerts"/>
    <div class="hint">We'll email you when critical geopolitical events are detected.</div>
    <button class="btn" type="submit">Create Account →</button>
  </form>
  <div class="link">Already have an account? <a href="/login">Login here</a></div>
</div>
</body>
</html>
