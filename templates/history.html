<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GeoAlert — Event History</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#080c10;--surf:#0e1419;--surf2:#141c24;--surf3:#1a2535;--border:#1e2d3d;--accent:#f5a623;--orange:#ff7a2f;--blue:#3b9eff;--red:#ff4455;--yellow:#ffd166;--green:#06d6a0;--text:#d4e4f7;--muted:#5a7a99;--head:'Bebas Neue',sans-serif;--body:'DM Sans',sans-serif;--mono:'DM Mono',monospace;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--body);min-height:100vh;}
header{position:sticky;top:0;z-index:200;background:rgba(8,12,16,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:60px;}
.brand-name{font-family:var(--head);font-size:28px;letter-spacing:2px;color:var(--accent);}
.nav-link{color:var(--muted);text-decoration:none;font-family:var(--mono);font-size:11px;padding:6px 14px;border:1px solid var(--border);border-radius:6px;transition:all 0.2s;margin-left:6px;}
.nav-link:hover{color:var(--accent);border-color:var(--accent);}
.main{max-width:1000px;margin:0 auto;padding:28px 24px;}
.sec-head{font-family:var(--head);font-size:13px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;gap:12px;}
.sec-head::after{content:'';flex:1;height:1px;background:var(--border);}
.controls{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;}
.search-inp{flex:1;min-width:220px;background:var(--surf);border:1px solid var(--border);color:var(--text);padding:9px 16px;border-radius:8px;font-family:var(--mono);font-size:12px;outline:none;}
.search-inp:focus{border-color:var(--accent);}
.search-inp::placeholder{color:var(--muted);}
select{background:var(--surf);border:1px solid var(--border);color:var(--text);padding:9px 14px;border-radius:8px;font-family:var(--mono);font-size:12px;outline:none;cursor:pointer;}
select:focus{border-color:var(--accent);}
.ref-btn{background:linear-gradient(135deg,var(--accent),var(--orange));border:none;color:#000;padding:9px 20px;border-radius:8px;font-family:var(--mono);font-size:11px;font-weight:500;cursor:pointer;}
.panel{background:var(--surf);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.panel-head{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:var(--surf2);}
.panel-title{font-family:var(--head);font-size:16px;letter-spacing:2px;}
.panel-count{font-family:var(--mono);font-size:11px;color:var(--accent);background:var(--surf3);padding:3px 10px;border-radius:12px;border:1px solid var(--border);}
.news-item{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;gap:12px;cursor:pointer;transition:background 0.2s;}
.news-item:hover{background:var(--surf2);}
.sev-bar{width:3px;min-height:40px;border-radius:2px;flex-shrink:0;}
.sev-critical{background:var(--red);}
.sev-high{background:var(--orange);}
.sev-medium{background:var(--yellow);}
.sev-normal{background:var(--green);}
.news-title{font-size:13px;font-weight:500;line-height:1.45;margin-bottom:6px;}
.news-meta{display:flex;gap:8px;flex-wrap:wrap;}
.news-source{font-family:var(--mono);font-size:10px;color:var(--blue);}
.news-time{font-family:var(--mono);font-size:10px;color:var(--muted);}
.news-cat{font-family:var(--mono);font-size:9px;padding:2px 7px;border-radius:4px;background:var(--surf3);color:var(--muted);text-transform:uppercase;}
.sev-badge{font-family:var(--mono);font-size:9px;padding:2px 7px;border-radius:4px;text-transform:uppercase;}
.sev-badge.critical{background:rgba(255,68,85,0.15);color:var(--red);}
.sev-badge.high{background:rgba(255,122,47,0.15);color:var(--orange);}
.sev-badge.medium{background:rgba(255,209,102,0.15);color:var(--yellow);}
.sev-badge.normal{background:rgba(6,214,160,0.1);color:var(--green);}
.loading{text-align:center;padding:40px;color:var(--muted);}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg)}}
footer{border-top:1px solid var(--border);padding:16px 32px;text-align:center;font-family:var(--mono);font-size:11px;color:var(--muted);}
footer span{color:var(--accent);}
</style>
</head>
<body>
<header>
  <div>
    <div class="brand-name">🌐 GeoAlert</div>
  </div>
  <div>
    <a href="/" class="nav-link">← Dashboard</a>
    <a href="/profile" class="nav-link">⚙️ Profile</a>
    <a href="/logout" class="nav-link">Logout</a>
  </div>
</header>

<div class="main">
  <div class="sec-head">Event History</div>

  <div class="controls">
    <input type="text" class="search-inp" id="search" placeholder="🔍 Search by keyword..."/>
    <select id="cat-filter">
      <option value="all">All Categories</option>
      <option value="conflict">🔫 Conflict</option>
      <option value="energy">⚡ Energy</option>
      <option value="economy">💹 Economy</option>
      <option value="disaster">🌀 Disaster</option>
      <option value="world">🌍 World</option>
    </select>
    <select id="sev-filter">
      <option value="all">All Severities</option>
      <option value="critical">🔴 Critical</option>
      <option value="high">🟠 High</option>
      <option value="medium">🟡 Medium</option>
      <option value="normal">🟢 Normal</option>
    </select>
    <button class="ref-btn" onclick="loadHistory()">🔍 Search</button>
  </div>

  <div class="panel">
    <div class="panel-head">
      <span class="panel-title">STORED EVENTS</span>
      <span class="panel-count" id="result-count">0 records</span>
    </div>
    <div id="history-list">
      <div class="loading"><div class="spinner"></div><p>Loading history...</p></div>
    </div>
  </div>
</div>

<footer>GeoAlert v2 &mdash; <span>MCA Major Project</span></footer>

<script>
const catIcon = {conflict:'🔫',energy:'⚡',economy:'💹',disaster:'🌀',world:'🌍'};

async function loadHistory() {
  document.getElementById('history-list').innerHTML = '<div class="loading"><div class="spinner"></div><p>Searching...</p></div>';
  const q = document.getElementById('search').value.trim();
  const cat = document.getElementById('cat-filter').value;
  const sev = document.getElementById('sev-filter').value;
  const params = new URLSearchParams();
  if (q) params.set('q', q);
  if (cat !== 'all') params.set('category', cat);
  if (sev !== 'all') params.set('severity', sev);

  try {
    const res = await fetch('/api/news/search?' + params.toString());
    const data = await res.json();
    document.getElementById('result-count').textContent = `${data.length} records`;
    if (!data.length) {
      document.getElementById('history-list').innerHTML = '<div class="loading"><p>No records found. Try refreshing the dashboard first.</p></div>';
      return;
    }
    document.getElementById('history-list').innerHTML = data.map(a => `
      <div class="news-item" onclick="window.open('${a.link||'#'}','_blank')">
        <div class="sev-bar sev-${a.severity}"></div>
        <div>
          <div class="news-title">${a.title}</div>
          <div class="news-meta">
            <span class="news-source">${a.source}</span>
            <span class="news-time">${a.time||''}</span>
            <span class="news-cat">${catIcon[a.category]||'📰'} ${a.category}</span>
            <span class="sev-badge ${a.severity}">${a.severity}</span>
          </div>
        </div>
      </div>
    `).join('');
  } catch(e) {
    document.getElementById('history-list').innerHTML = '<div class="loading"><p>Error loading history.</p></div>';
  }
}

// Search on Enter key
document.getElementById('search').addEventListener('keydown', e => { if(e.key==='Enter') loadHistory(); });

loadHistory();
</script>
</body>
</html>
